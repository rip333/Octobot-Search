name: GitHub Pages deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Installing my packages
        run: npm ci

      - name: Create GCP Key file from secret 🔑
        env:
          GCP_KEY_JSON: ${{ secrets.GCP_KEY_JSON }}
        run: echo "$GCP_KEY_JSON" > gcp-key.json

      - name: Build my App
        run: npm run build
        env:
          GCP_KEY_JSON: ${{ secrets.GCP_KEY_JSON }}